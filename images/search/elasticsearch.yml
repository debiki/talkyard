# Internal private network, only the app container can access.
network.host: 0.0.0.0

# 1) Use a single index for all sites, but many shards, and route to the shard
# derived from the site id. Then only one shard will be touched, when indexing
# or querying. Therefore it's okay with 50 or 100 shards.
# 2) If a single site becomes super large, we can migrate it into its own index.
# See: https://www.elastic.co/videos/big-data-search-and-analytics/ (a video)
# 3) (Could keep current hot data in one index, and move old discussions that have
# been closed, to an old & slow index on cheaper hardware. Combine time & user data flow?)
# And keep deleted and unapproved posts in their own index too. [index_for_invisible]


# Configuring ElasticSearch:
# https://www.elastic.co/docs/deploy-manage/deploy/self-managed/configure-elasticsearch

# Index settings:
# https://www.elastic.co/docs/reference/elasticsearch/index-settings
# Configured in Scala code, see [es_ix_settings].

# Shared index: (but old possibly out-of-date docs)
# https://www.elastic.co/guide/en/elasticsearch/guide/current/shared-index.html

cluster.name: TyEsCluster
node.name: TyEsNode1

# We create indexes only via talkyard.server.search.IndexCreator.createIndexIfNeeded(),
# so can specify a mapping and the right data types.
action.auto_create_index: false

discovery.type: single-node

bootstrap.memory_lock: true

xpack.security.enabled: false
xpack.security.enrollment.enabled: false

# Save significant RAM by disabling Machine Learning [says_Gemini]
xpack.ml.enabled: false

# Disable the GeoIP downloader to prevent unnecessary background network calls [says_Gemini]
# Magnus: Apparently off by default, silly AI.
ingest.geoip.downloader.enabled: false

# ES 9 uses a lot of memory for 'Circuit Breakers'.
# On a small VPS, these help prevent OOM crashes. [says_Gemini]
# See: https://www.elastic.co/docs/reference/elasticsearch/configuration-reference/circuit-breaker-settings
indices.breaker.total.limit: 70%

logger.org.elasticsearch.rest: DEBUG


